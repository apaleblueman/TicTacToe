<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../JS/script.js" defer></script>
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Document</title>
</head>
<body>
    <div class="content">
        <div class="header">
            <h1>TicTacToe</h1>
        </div>
        <div class="grid">
            <div class="row">
                <div class="cell" id="00"></div>
                <div class="cell" id="01"></div>
                <div class="cell" id="02"></div>
            </div>
            <div class="row">
                <div class="cell" id="10"></div>
                <div class="cell" id="11"></div>
                <div class="cell" id="12"></div>
            </div>
            <div class="row">
                <div class="cell" id="20"></div>
                <div class="cell" id="21"></div>
                <div class="cell" id="22"></div>
            </div>
        </div>
        <div class="gameControls">
            <button id="start">Start</button>
            <button id="reset">Reset</button>
        </div>
        <dialog id="my-dialog">
            <div class="my-dialog">
            <form method="get" class="my-dialog">
                <div class="input-container"><label for="title">title of book:</label><input type="text" name="title" id="title" required><br></div>
                <div class="input-container"><label for="author">Name of author:</label><input type="text" name="author" id="author" required><br></div>
                <div class="input-container"><label for="pages">Number of pages:</label><input type="number" name="pages" id="pages" required><br></div>
                <div class="input-container"><label for="read_status">Marked Finished:</label><input type="checkbox" name="read_status" id="read_status" required></div>
            </form>
            <div class="button-container">
                <button commandfor="my-dialog" command="close">cancel</button>
                <button type="submit" id="addbook">Submit</button>
            </div>
            </div>
        </dialog>
    </div>
    

</body>
</html>
