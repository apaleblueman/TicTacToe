<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../JS/script.js" defer></script>
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Document</title>
</head>
<body>
    <div class="content">
        <div class="header">
            <h1>TicTacToe</h1>
        </div>
        <div class="grid">
            <div class="row">
                <div class="cell" id="00"></div>
                <div class="cell" id="01"></div>
                <div class="cell" id="02"></div>
            </div>
            <div class="row">
                <div class="cell" id="10"></div>
                <div class="cell" id="11"></div>
                <div class="cell" id="12"></div>
            </div>
            <div class="row">
                <div class="cell" id="20"></div>
                <div class="cell" id="21"></div>
                <div class="cell" id="22"></div>
            </div>
        </div>
        <div class="gameControls">
            <button command="show-modal" commandfor="choice" id="start">Start</button>
            <button id="reset">Reset</button>
        </div>
        <dialog id="choice">
                <div>
                    <label for="player1">Starting player's choice? </label>
                    <label><input id="x" type="radio" name="radio" value="X" checked/>X</label>
                    <label><input id="o" type="radio" name="radio" value="O" />O</label>
                </div>
                <button id="startgame">Start Game</button>                    
            <button command="close" commandfor="choice" id="close">cancel</button>
        </dialog>
        
    </div>
    

</body>
</html>
